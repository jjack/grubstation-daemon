# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Let new action versions settle for 7 days before opening a PR (same as HA Core)
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    # Let patch releases settle 3 days, minor releases 7 days before opening a PR
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    commit-message:
      prefix: "chore(deps)"
