# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - main: ./cmd/grubstation
    ldflags:
      - -s -w -X github.com/jjack/grubstation-daemon/internal/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - arm64
      - amd64
      - "386"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - homepage: "https://github.com/jjack/grubstation-daemon"
    maintainer: "jjack"
    description: "Agent to manage bare-metal OS booting via Home Assistant and WOL"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk

msis:
  - id: grubstation
    upgrade_code: 2e8b9308-466d-4952-9d33-4f9342718712
    maintainer: "Jeremy Jack"
    homepage: "https://github.com/jjack/grubstation-cli" # Updated per repo naming
    description: "Agent to manage bare-metal OS booting via Home Assistant and WOL"
    license: "Apache-2.0"
    
    template: ./.build/windows/template.wxs
    
    # Ensures wixl can map the binary name correctly
    replacements:
      BINARY: grubstation
    
    # Pass the version to the WiX template variables
    wxs_variables:
      Version: "{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
