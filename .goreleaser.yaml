# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - main: ./cmd/grub-os-reporter
    ldflags:
      - -s -w -X github.com/jjack/grub-os-reporter/internal/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - arm64
      - amd64
      - "386"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - homepage: "https://github.com/jjack/grub-os-reporter"
    maintainer: "jjack"
    description: "Agent to manage bare-metal OS booting via Home Assistant and WOL"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk

msis:
  - upgrade_code: 2e8b9308-466d-4952-9d33-4f9342718712
    maintainer: "jjack"
    homepage: "https://github.com/jjack/grub-os-reporter"
    description: "Agent to manage bare-metal OS booting via Home Assistant and WOL"
    license: "MIT"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
